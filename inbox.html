<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>仔仔英文速查 | K1 親子對話手冊</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#FBF6EE;
    --paper:#FFFFFF;
    --ink:#233240;
    --ink-soft:#5B6B78;
    --coral:#E8876A;
    --coral-deep:#D9714F;
    --sage:#8FA888;
    --sage-deep:#6F8A68;
    --sun:#F3C46C;
    --line:#EAE0CF;
    --shadow: 0 4px 14px rgba(35,50,64,0.08);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--cream);
    color:var(--ink);
    font-family:'Nunito',sans-serif;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
    padding-bottom:60px;
  }
  .bg-deco{
    position:fixed; inset:0; pointer-events:none; z-index:0;
    background:
      radial-gradient(circle at 8% 6%, rgba(232,135,106,0.10) 0%, transparent 40%),
      radial-gradient(circle at 95% 18%, rgba(143,168,136,0.12) 0%, transparent 38%),
      radial-gradient(circle at 50% 100%, rgba(243,196,108,0.10) 0%, transparent 45%);
  }
  header{
    position:sticky; top:0; z-index:20;
    background:var(--cream);
    padding:18px 18px 12px;
    border-bottom:1px solid var(--line);
  }
  .title-row{
    display:flex; align-items:baseline; justify-content:space-between; gap:8px;
    max-width:640px; margin:0 auto 12px;
  }
  h1{
    font-family:'Fredoka',sans-serif;
    font-size:22px; font-weight:700; margin:0;
    color:var(--ink); letter-spacing:-0.2px;
  }
  .tag{
    font-size:11px; font-weight:700; color:var(--coral-deep);
    background:rgba(232,135,106,0.14);
    padding:4px 9px; border-radius:20px;
    white-space:nowrap;
  }
  .search-wrap{
    max-width:640px; margin:0 auto; position:relative;
  }
  #search{
    width:100%; padding:13px 44px 13px 16px;
    border-radius:16px; border:2px solid var(--line);
    background:var(--paper);
    font-family:'Nunito',sans-serif;
    font-size:16px; font-weight:600; color:var(--ink);
    outline:none;
    transition:border-color .15s ease;
  }
  #search:focus{border-color:var(--coral);}
  #search::placeholder{color:#B7AE9C; font-weight:600;}
  .search-icon{
    position:absolute; right:14px; top:50%; transform:translateY(-50%);
    font-size:18px; opacity:.5; pointer-events:none;
  }
  .chips{
    max-width:640px; margin:12px auto 0;
    display:flex; gap:8px; overflow-x:auto; padding-bottom:2px;
    scrollbar-width:none;
  }
  .chips::-webkit-scrollbar{display:none;}
  .chip{
    flex:0 0 auto;
    font-family:'Fredoka',sans-serif;
    font-size:13.5px; font-weight:600;
    padding:8px 14px; border-radius:20px;
    background:var(--paper); border:1.5px solid var(--line);
    color:var(--ink-soft); cursor:pointer;
    display:flex; align-items:center; gap:6px;
    transition:all .15s ease; user-select:none;
  }
  .chip:active{transform:scale(0.96);}
  .chip.active{
    background:var(--ink); border-color:var(--ink); color:#fff;
  }
  main{max-width:640px; margin:0 auto; padding:16px 18px 0; position:relative; z-index:1;}
  .profile-card{
    max-width:640px; margin:18px auto 4px; padding:20px 20px 22px;
    background:var(--paper); border:1px solid var(--line);
    border-radius:20px; box-shadow:var(--shadow);
    display:flex; flex-direction:column; align-items:center;
    text-align:center;
  }
  .profile-photo{
    width:84px; height:84px; border-radius:50%;
    object-fit:cover; border:3px solid var(--cream);
    box-shadow:0 0 0 2px var(--coral);
    margin-bottom:12px;
  }
  .profile-name{
    font-family:'Fredoka',sans-serif; font-size:17px; font-weight:700;
    color:var(--ink); margin-bottom:2px;
  }
  .profile-handle{
    font-size:12.5px; color:var(--coral-deep); font-weight:700;
    margin-bottom:10px;
  }
  .profile-badges{
    display:flex; flex-wrap:wrap; justify-content:center; gap:6px;
    margin-bottom:12px;
  }
  .profile-badge{
    font-size:10.5px; font-weight:700; color:var(--sage-deep);
    background:rgba(143,168,136,0.14);
    padding:4px 9px; border-radius:14px; white-space:nowrap;
  }
  .profile-bio{
    font-size:13px; color:var(--ink-soft); font-weight:600;
    line-height:1.6; max-width:480px; margin-bottom:16px;
  }
  .profile-cta{
    display:flex; gap:10px; flex-wrap:wrap; justify-content:center;
  }
  .profile-cta a{
    text-decoration:none;
    font-family:'Fredoka',sans-serif; font-weight:600; font-size:13px;
    padding:10px 18px; border-radius:14px;
    display:inline-flex; align-items:center; gap:7px;
  }
  .profile-cta a svg{flex:0 0 auto;}
  .cta-ig, .cta-wa{
    background:var(--cream); color:var(--ink); border:1.5px solid var(--line);
  }
  .section{margin-bottom:26px;}
  .section-head{
    display:flex; align-items:center; gap:8px;
    margin:0 0 10px 2px;
  }
  .section-head .emo{font-size:19px;}
  .section-head h2{
    font-family:'Fredoka',sans-serif;
    font-size:16px; font-weight:600; margin:0; color:var(--ink);
  }
  .section-head .count{
    font-size:12px; color:var(--ink-soft); font-weight:700;
    background:rgba(35,50,64,0.06); padding:2px 8px; border-radius:10px;
  }
  .card{
    background:var(--paper);
    border:1px solid var(--line);
    border-radius:14px;
    padding:13px 15px;
    margin-bottom:8px;
    box-shadow:var(--shadow);
    cursor:pointer;
    transition:transform .12s ease, box-shadow .12s ease;
  }
  .card:active{transform:scale(0.985);}
  .en-row{
    display:flex; align-items:center; gap:8px; margin-bottom:3px;
  }
  .en{
    font-family:'Fredoka',sans-serif;
    font-size:16.5px; font-weight:600; color:var(--ink);
  }
  .zh{
    font-size:14px; color:var(--ink-soft); font-weight:600;
  }
  .speak-btn{
    flex:0 0 auto;
    width:28px; height:28px; border-radius:50%;
    border:1.5px solid var(--line); background:var(--cream);
    display:flex; align-items:center; justify-content:center;
    font-size:13px; cursor:pointer; color:var(--coral-deep);
  }
  .speak-btn:active{transform:scale(0.9); background:var(--coral); color:#fff;}
  .speak-btn.playing{background:var(--coral); color:#fff; border-color:var(--coral);}
  .voice-note{
    max-width:640px; margin:0 auto; padding:0 2px;
    font-size:11.5px; color:#B7AE9C; font-weight:600; text-align:center;
  }
  .voice-picker-row{
    max-width:640px; margin:10px auto 0;
    display:flex; align-items:center; gap:8px;
  }
  .voice-picker-row label{
    font-size:12px; font-weight:700; color:var(--ink-soft); white-space:nowrap;
  }
  #voiceSelect{
    flex:1; min-width:0;
    padding:9px 12px; border-radius:12px; border:1.5px solid var(--line);
    background:var(--paper); font-family:'Nunito',sans-serif;
    font-size:13px; font-weight:600; color:var(--ink);
    -webkit-appearance:none; appearance:none;
  }
  #voiceTest{
    flex:0 0 auto; width:34px; height:34px; border-radius:50%;
    border:1.5px solid var(--line); background:var(--sage);
    color:#fff; font-size:14px; cursor:pointer;
  }
  #voiceTest:active{transform:scale(0.9);}
  mark{
    background:var(--sun); color:var(--ink);
    border-radius:3px; padding:0 2px;
  }
  .empty{
    text-align:center; padding:50px 20px; color:var(--ink-soft);
  }
  .empty .emo{font-size:36px; display:block; margin-bottom:10px;}
  .fab{
    position:fixed; bottom:20px; right:20px; z-index:30;
    background:var(--coral); color:#fff;
    border:none; border-radius:50px;
    padding:14px 20px;
    font-family:'Fredoka',sans-serif; font-weight:600; font-size:14.5px;
    box-shadow:0 6px 18px rgba(217,113,79,0.4);
    display:flex; align-items:center; gap:7px;
    cursor:pointer;
  }
  .fab:active{transform:scale(0.95);}
  .modal-overlay{
    position:fixed; inset:0; background:rgba(35,50,64,0.45);
    z-index:40; display:none; align-items:flex-end; justify-content:center;
    backdrop-filter:blur(2px);
  }
  .modal-overlay.show{display:flex;}
  .modal{
    background:var(--paper);
    width:100%; max-width:640px;
    border-radius:22px 22px 0 0;
    padding:28px 24px 34px;
    text-align:center;
    animation:slideUp .22s ease;
  }
  @keyframes slideUp{from{transform:translateY(30px); opacity:0;} to{transform:translateY(0); opacity:1;}}
  .modal .cat{
    font-size:12px; font-weight:700; color:var(--coral-deep);
    text-transform:uppercase; letter-spacing:0.5px; margin-bottom:10px;
  }
  .modal .en-big{
    font-family:'Fredoka',sans-serif;
    font-size:25px; font-weight:700; color:var(--ink);
    margin-bottom:10px; line-height:1.3;
  }
  .modal .zh-big{
    font-size:16px; color:var(--ink-soft); font-weight:700; margin-bottom:20px;
  }
  .modal-close{
    background:var(--ink); color:#fff; border:none;
    padding:11px 26px; border-radius:14px;
    font-family:'Fredoka',sans-serif; font-weight:600; font-size:14px;
    cursor:pointer;
  }
  .modal-next{
    background:none; color:var(--ink-soft); border:none;
    font-size:13px; font-weight:700; margin-top:14px;
    text-decoration:underline; cursor:pointer;
  }
  footer{
    text-align:center; padding:24px 20px 10px;
    color:#B7AE9C; font-size:12px; font-weight:600;
  }
  .footer-tip{
    margin-bottom:16px;
  }
  .footer-brand{
    color:var(--ink-soft); font-size:13px; font-weight:700;
    line-height:1.7; margin-bottom:14px;
  }
  .ig-handle{
    color:var(--coral-deep); font-weight:800;
  }
  .footer-note{
    max-width:480px; margin:0 auto;
    font-size:10.5px; color:#C9C0AE; font-weight:600;
    line-height:1.7; border-top:1px solid var(--line);
    padding-top:14px;
  }
</style>
</head>

let activeCat = "全部";

function renderChips(){
  const chips = document.getElementById('chips');
  const cats = ["全部", ...DATA.map(s=>s.cat)];
  chips.innerHTML = cats.map(c=>{
    const emo = c==="全部" ? "✨" : DATA.find(s=>s.cat===c).emo;
    return `<div class="chip ${c===activeCat?'active':''}" data-cat="${c}">${emo} ${c}</div>`;
  }).join('');
  chips.querySelectorAll('.chip').forEach(el=>{
    el.addEventListener('click', ()=>{
      activeCat = el.dataset.cat;
      document.getElementById('search').value = '';
      renderChips();
      render();
    });
  });
}

function highlight(text, q){
  if(!q) return text;
  const idx = text.toLowerCase().indexOf(q.toLowerCase());
  if(idx === -1) return text;
  return text.slice(0,idx) + '<mark>' + text.slice(idx, idx+q.length) + '</mark>' + text.slice(idx+q.length);
}

function render(){
  const q = document.getElementById('search').value.trim().toLowerCase();
  const main = document.getElementById('main');
  let html = '';
  let totalMatches = 0;

  DATA.forEach(section=>{
    if(activeCat !== "全部" && activeCat !== section.cat) return;

    const filtered = section.items.filter(it=>{
      if(!q) return true;
      return it.en.toLowerCase().includes(q) || it.zh.toLowerCase().includes(q);
    });
    if(filtered.length === 0) return;
    totalMatches += filtered.length;

    html += `<div class="section">
      <div class="section-head">
        <span class="emo">${section.emo}</span>
        <h2>${section.cat}</h2>
        <span class="count">${filtered.length}</span>
      </div>`;
    filtered.forEach(it=>{
      html += `<div class="card" data-en="${it.en.replace(/"/g,'&quot;')}" data-zh="${it.zh.replace(/"/g,'&quot;')}" data-cat="${section.cat} ${section.emo}">
        <div class="en-row">
          <div class="en">${highlight(it.en, q)}</div>
          <button class="speak-btn" data-speak="${it.en.replace(/"/g,'&quot;')}">🔊</button>
        </div>
        <div class="zh">${highlight(it.zh, q)}</div>
      </div>`;
    });
    html += `</div>`;
  });

  if(totalMatches === 0){
    html = `<div class="empty"><span class="emo">🤔</span>搵唔到喎,試下打第啲關鍵字?</div>`;
  }

  main.innerHTML = html;

  main.querySelectorAll('.card').forEach(card=>{
    card.addEventListener('click', (e)=>{
      if(e.target.closest('.speak-btn')) return;
      openModal(card.dataset.en, card.dataset.zh, card.dataset.cat);
    });
  });
  main.querySelectorAll('[data-speak]').forEach(btn=>{
    btn.addEventListener('click', (e)=>{
      e.stopPropagation();
      speak(btn.dataset.speak, btn);
    });
  });
}

let ukVoice = null;
let allVoices = [];

// 已知嘅英式男聲名(Safari/iOS常見default,要避開)
const KNOWN_MALE = ['daniel', 'arthur', 'oliver', 'ryan', 'rocko'];
// 已知嘅英式女聲名,由優先到次要
const KNOWN_FEMALE = ['serena', 'kate', 'martha', 'tessa', 'fiona', 'moira', 'female', 'google uk english female'];

function loadVoice(){
  const voices = window.speechSynthesis ? window.speechSynthesis.getVoices() : [];
  allVoices = voices;
  const gbVoices = voices.filter(v => v.lang === 'en-GB');
  const pool = gbVoices.length ? gbVoices : voices.filter(v => v.lang && v.lang.startsWith('en'));

  let pick = null;
  for(const name of KNOWN_FEMALE){
    pick = pool.find(v => v.name.toLowerCase().includes(name));
    if(pick) break;
  }
  if(!pick){
    pick = pool.find(v => !KNOWN_MALE.some(m => v.name.toLowerCase().includes(m)));
  }
  ukVoice = pick || pool[0] || null;
}
if(window.speechSynthesis){
  loadVoice();
  window.speechSynthesis.onvoiceschanged = loadVoice;
}

function speak(text, btnEl){
  if(!window.speechSynthesis){
    alert('呢個瀏覽器唔支援語音朗讀,建議用 Chrome 或 Safari 開。');
    return;
  }
  window.speechSynthesis.cancel();
  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = 'en-GB';
  if(ukVoice) utter.voice = ukVoice;
  utter.rate = 0.85;
  if(btnEl){
    btnEl.classList.add('playing');
    utter.onend = () => btnEl.classList.remove('playing');
    utter.onerror = () => btnEl.classList.remove('playing');
  }
  window.speechSynthesis.speak(utter);
}

function openModal(en, zh, cat){
  document.getElementById('modalCat').textContent = cat;
  document.getElementById('modalEn').textContent = en;
  document.getElementById('modalZh').textContent = zh;
  document.getElementById('modalSpeak').dataset.speak = en;
  document.getElementById('modalOverlay').classList.add('show');
  speak(en, document.getElementById('modalSpeak'));
}
function closeModal(){
  window.speechSynthesis && window.speechSynthesis.cancel();
  document.getElementById('modalOverlay').classList.remove('show');
}

function randomPhrase(){
  const pool = activeCat === "全部"
    ? DATA.flatMap(s=>s.items.map(it=>({...it, cat:`${s.cat} ${s.emo}`})))
    : DATA.filter(s=>s.cat===activeCat).flatMap(s=>s.items.map(it=>({...it, cat:`${s.cat} ${s.emo}`})));
  const pick = pool[Math.floor(Math.random()*pool.length)];
  openModal(pick.en, pick.zh, pick.cat);
}

document.getElementById('search').addEventListener('input', render);
document.getElementById('randomBtn').addEventListener('click', randomPhrase);
document.getElementById('modalClose').addEventListener('click', closeModal);
document.getElementById('modalSpeak').addEventListener('click', (e)=>{
  speak(e.currentTarget.dataset.speak, e.currentTarget);
});
document.getElementById('modalNext').addEventListener('click', randomPhrase);
document.getElementById('modalOverlay').addEventListener('click', (e)=>{
  if(e.target.id === 'modalOverlay') closeModal();
});

renderChips();
render();
</script>
